name: Go generate

on:
  schedule:
    - cron: '4 15 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  go-gen:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Generate Code
        run: |
          go mod download
          go generate ./...
          go mod tidy

      - name: Verify Changes
        id: check
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Safety Check
        if: steps.check.outputs.has_changes == 'true'
        run: |
          if go test -race ./...; then
            echo "Tests passed, proceeding to PR"
          else
            echo "::error::Generated code broke tests"
            exit 1
          fi

      - name: Create Pull Request
        if: steps.check.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat(api): update generated code from latest docs"
          title: "feat(api): update generated code from latest docs"
          body: Automated changes triggered by `go generate`.
          branch: create-pull-request/go-generate
          delete-branch: true
          labels: go-generate
